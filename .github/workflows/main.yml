name: build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} - stable
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Install SVN (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install SVN (macOS)
        if: runner.os == 'macOS'
        run: brew install subversion

      - name: Install SVN (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://sliksvn.com/pub/Slik-Subversion-1.14.5-x64.zip" -OutFile svn.zip
          Expand-Archive svn.zip -DestinationPath C:\svn
          $msi = Get-ChildItem -Path C:\svn -Filter "*.msi" | Select-Object -First 1
          Start-Process msiexec.exe -ArgumentList "/i", $msi.FullName, "/quiet", "/norestart" -Wait
          echo "C:\Program Files\SlikSvn\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "C:\Program Files\SlikSvn\bin\svn.exe" --version

      - name: Compile sources for tests
        run: npm run test-compile

      - name: Run tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test
        env:
          CODE_VERSION: stable

      - name: Release
        if: startsWith(matrix.os, 'ubuntu') && github.ref == 'refs/heads/master' && github.repository == 'NavAI-B/svn-scm'
        run: |
          npm run organize
          npm run semantic-release
        env:
          VSCE_TOKEN: ${{ secrets.vsceToken }}
          GITHUB_TOKEN: ${{ secrets.githubToken }}
          GH_TOKEN: ${{ secrets.githubToken }}
          GIT_AUTHOR_EMAIL: ${{ secrets.gitEmail }}
          GIT_COMMITTER_EMAIL: ${{ secrets.gitEmail }}
          GIT_AUTHOR_NAME: ${{ secrets.gitName }}
          GIT_COMMITTER_NAME: ${{ secrets.gitName }}

  eslint:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Lint check
        run: npm run lint --silent -- -f stylish

  artifact:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Package extension
        run: npx vsce package -o svn-scm-modified.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: svn-scm-modified-${{ github.sha }}
          path: svn-scm-modified.vsix

      - name: Package open-vsx extension
        run: npx vsce package -o svn-scm-modified-ovsx.vsix

      - name: Upload open-vsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: svn-scm-modified-ovsx-${{ github.sha }}
          path: svn-scm-modified-ovsx.vsix
